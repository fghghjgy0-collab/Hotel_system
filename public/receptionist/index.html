<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receptionist Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #E8821A;
      --dark: #0F172A;
      --darker: #0A0E1A;
      --gray: #475569;
      --light-gray: #E2E8F0;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--dark);
      color: white;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* ==================== LOGIN SCREEN ==================== */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
      flex-direction: column;
    }

    .login-screen.hidden {
      display: none;
    }

    .login-card {
      background: var(--darker);
      border: 2px solid var(--gray);
      border-radius: 12px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .login-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .login-subtitle {
      text-align: center;
      color: var(--gray);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .pin-display {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .pin-digit {
      aspect-ratio: 1;
      background: var(--dark);
      border: 2px solid var(--gray);
      border-radius: 8px;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .pin-digit.filled {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .pin-key {
      aspect-ratio: 1;
      background: var(--dark);
      border: 2px solid var(--gray);
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pin-key:hover {
      background: var(--gray);
      border-color: var(--primary);
    }

    .pin-key:active {
      transform: scale(0.95);
    }

    .pin-backspace {
      grid-column: span 3;
      background: var(--danger);
      border-color: var(--danger);
    }

    .pin-backspace:hover {
      background: #dc2626;
      border-color: #dc2626;
    }

    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      color: #fca5a5;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 1rem;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    /* ==================== MAIN DASHBOARD ==================== */
    .main-content {
      display: flex;
      flex-direction: column;
      width: 100%;
      background: var(--dark);
    }

    .main-content.hidden {
      display: none;
    }

    .top-bar {
      background: var(--darker);
      border-bottom: 2px solid var(--gray);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: var(--danger);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .revenue-counter {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 700;
      text-align: right;
    }

    .revenue-label {
      font-size: 0.75rem;
      color: var(--gray);
    }

    .revenue-amount {
      font-size: 1.3rem;
      color: var(--success);
    }

    /* Logout button */
    .btn-logout {
      background: var(--danger);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: #dc2626;
    }

    /* ==================== MAIN GRID ==================== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .dashboard-tabs {
      display: flex;
      gap: 0.75rem;
      padding: 1rem 1.5rem 0;
      background: var(--dark);
    }

    .dashboard-tab {
      border: 1px solid var(--gray);
      background: var(--darker);
      color: white;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .dashboard-tab.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(232, 130, 26, 0.12);
    }

    .payment-alert {
      display: none;
      margin: 1rem 1.5rem 0;
      background: rgba(232, 130, 26, 0.16);
      border: 1px solid var(--primary);
      color: #fed7aa;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 800;
    }

    .payment-alert.show {
      display: block;
    }

    .payments-list {
      display: none;
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .payments-list.active {
      display: block;
    }

    .payment-card {
      background: var(--darker);
      border: 2px solid var(--gray);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .payment-card-header {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .payment-total {
      color: var(--success);
      font-size: 1.35rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .payment-items {
      color: var(--light-gray);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .btn-confirm-payment {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: var(--success);
      color: white;
      padding: 0.85rem;
      font-weight: 900;
      cursor: pointer;
    }

    .bill-card-total {
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid var(--success);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--success);
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
    }

    .bill-row {
      background: var(--dark);
      border-left: 4px solid var(--primary);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .bill-row-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .bill-summary-line {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0;
      color: var(--light-gray);
      font-weight: 700;
    }

    .table-card {
      background: var(--darker);
      border: 2px solid var(--gray);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .table-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(232, 130, 26, 0.2);
    }

    .table-card.active {
      border-color: var(--primary);
      background: rgba(232, 130, 26, 0.1);
    }

    .table-card.payment-requested {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
    }

    .table-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .table-name {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .pending-badge {
      background: var(--warning);
      color: var(--dark);
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .pending-badge.zero {
      background: rgba(255, 255, 255, 0.1);
      color: var(--gray);
    }

    .payment-badge {
      display: inline-block;
      margin-top: 0.5rem;
      background: rgba(239, 68, 68, 0.18);
      color: #fca5a5;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .table-info {
      font-size: 0.85rem;
      color: var(--gray);
      line-height: 1.6;
    }

    /* ==================== SIDE PANEL ==================== */
    .side-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: var(--darker);
      border-left: 2px solid var(--gray);
      display: flex;
      flex-direction: column;
      transition: right 0.3s ease;
      z-index: 100;
      box-shadow: -4px 0 20px rgba(0,0,0,0.3);
    }

    .side-panel.active {
      right: 0;
    }

    .panel-header {
      background: var(--dark);
      border-bottom: 2px solid var(--gray);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .order-item {
      background: var(--dark);
      border-left: 4px solid var(--primary);
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
    }

    .order-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .order-item-name {
      font-weight: 700;
    }

    .order-item-status {
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
    }

    .status-preparing {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .status-served {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .order-item-details {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--gray);
      margin-bottom: 0.75rem;
    }

    .order-item-notes {
      font-size: 0.8rem;
      color: var(--gray);
      margin-bottom: 0.75rem;
      font-style: italic;
    }

    .order-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-small {
      flex: 1;
      padding: 0.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-bill {
      margin-top: 1rem;
      width: 100%;
      background: rgba(232, 130, 26, 0.16);
      color: var(--primary);
      border: 1px solid var(--primary);
      padding: 0.65rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }

    .table-payment-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn-table-payment {
      width: 100%;
      background: var(--success);
      color: white;
      border: none;
      padding: 0.65rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }

    .btn-table-payment.requested {
      background: var(--primary);
      box-shadow: 0 0 0 0 rgba(232, 130, 26, 0.55);
      animation: paymentPulse 1.4s infinite;
    }

    .btn-table-payment.paid {
      background: #64748b;
      cursor: default;
      opacity: 0.75;
      animation: none;
    }

    @keyframes paymentPulse {
      0% { box-shadow: 0 0 0 0 rgba(232, 130, 26, 0.55); }
      70% { box-shadow: 0 0 0 8px rgba(232, 130, 26, 0); }
      100% { box-shadow: 0 0 0 0 rgba(232, 130, 26, 0); }
    }

    .btn-preparing {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      border: 1px solid #60a5fa;
    }

    .btn-preparing:hover {
      background: #60a5fa;
      color: white;
    }

    .btn-served {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .btn-served:hover {
      background: var(--success);
      color: white;
    }

    .btn-payment {
      width: 100%;
      margin-bottom: 1rem;
      background: var(--danger);
      color: white;
      border: none;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
    }

    .payment-summary {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #fecaca;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    /* ==================== NOTIFICATIONS ==================== */
    .notification {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: rgba(232, 130, 26, 0.2);
      border: 2px solid var(--primary);
      color: var(--primary);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      animation: slideIn 0.3s ease;
      z-index: 200;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .side-panel {
        width: 100%;
        right: -100%;
      }

      .login-card {
        margin: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-title">👔 Receptionist</div>
      <div class="login-subtitle">Enter your PIN to continue</div>

      <div class="login-error" id="loginError">Invalid PIN</div>

      <div class="pin-display" id="pinDisplay">
        <div class="pin-digit"></div>
        <div class="pin-digit"></div>
        <div class="pin-digit"></div>
        <div class="pin-digit"></div>
      </div>

      <div class="pin-keypad">
        <button class="pin-key" onclick="addPinDigit('1')">1</button>
        <button class="pin-key" onclick="addPinDigit('2')">2</button>
        <button class="pin-key" onclick="addPinDigit('3')">3</button>
        <button class="pin-key" onclick="addPinDigit('4')">4</button>
        <button class="pin-key" onclick="addPinDigit('5')">5</button>
        <button class="pin-key" onclick="addPinDigit('6')">6</button>
        <button class="pin-key" onclick="addPinDigit('7')">7</button>
        <button class="pin-key" onclick="addPinDigit('8')">8</button>
        <button class="pin-key" onclick="addPinDigit('9')">9</button>
        <button class="pin-key" onclick="addPinDigit('0')">0</button>
        <button class="pin-key pin-backspace" onclick="removePinDigit()">← Clear</button>
      </div>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div class="main-content hidden" id="mainContent">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <div class="title">📞 Restaurant Orders</div>
        <div class="connection-status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Connected</span>
        </div>
      </div>
      <div style="display: flex; gap: 1rem; align-items: center;">
        <div class="revenue-counter">
          <div class="revenue-label">Today's Revenue</div>
          <div class="revenue-amount" id="revenueAmount">₹0</div>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="payment-alert" id="paymentAlert"></div>

    <div class="dashboard-tabs">
      <button class="dashboard-tab active" id="ordersTabBtn" onclick="switchDashboardTab('orders')">📦 Orders</button>
      <button class="dashboard-tab" id="paymentsTabBtn" onclick="switchDashboardTab('payments')">💳 Payments</button>
    </div>

    <!-- Grid of Tables -->
    <div class="grid" id="tablesGrid"></div>
    <div class="payments-list" id="paymentsList"></div>
  </div>

  <!-- Side Panel -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">Table 1</div>
      <button class="close-btn" onclick="closeSidePanel()">✕</button>
    </div>
    <div class="panel-content" id="panelContent"></div>
  </div>

  <!-- Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>

  <script>
    // ==================== GLOBAL STATE ====================
    let pinInput = '';
    let token = null;
    let socket = null;
    let selectedTableId = null;
    let allTables = [];
    let allOrders = [];
    let paymentRequests = [];
    let paymentStatuses = {};
    let billPanelTableId = null;

    // ==================== PIN INPUT ====================
    function addPinDigit(digit) {
      if (pinInput.length < 4) {
        pinInput += digit;
        updatePinDisplay();

        if (pinInput.length === 4) {
          loginWithPin();
        }
      }
    }

    function removePinDigit() {
      pinInput = '';
      updatePinDisplay();
      document.getElementById('loginError').classList.remove('show');
    }

    function updatePinDisplay() {
      const display = document.getElementById('pinDisplay');
      const digits = display.querySelectorAll('.pin-digit');
      digits.forEach((digit, index) => {
        digit.classList.toggle('filled', index < pinInput.length);
        digit.textContent = index < pinInput.length ? '●' : '';
      });
    }

    // ==================== LOGIN ====================
    async function loginWithPin() {
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            role: 'receptionist',
            pin: pinInput
          })
        });

        const result = await response.json();

        if (!result.success) {
          showLoginError();
          pinInput = '';
          updatePinDisplay();
          return;
        }

        token = result.token;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');

        // Initialize dashboard
        loadTables();
        loadPaymentRequests();
        initializeSocket();
      } catch (error) {
        console.error('Login error:', error);
        showLoginError();
        pinInput = '';
        updatePinDisplay();
      }
    }

    function showLoginError() {
      const error = document.getElementById('loginError');
      error.classList.add('show');
      setTimeout(() => error.classList.remove('show'), 2000);
    }

    function logout() {
      token = null;
      pinInput = '';
      selectedTableId = null;
      document.getElementById('mainContent').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      if (socket) socket.disconnect();
      updatePinDisplay();
    }

    // ==================== SOCKET.IO ====================
    function initializeSocket() {
      socket = io();

      socket.on('connect', () => {
        console.log('Socket connected');
        document.getElementById('statusDot').classList.remove('disconnected');
        document.getElementById('statusText').textContent = 'Connected';

        if (token) {
          socket.emit('join_receptionist', { token });
        }
      });

      socket.on('new_order', (data) => {
        console.log('New order:', data);
        playNotificationSound();
        showNotification(`🔔 New order! Table ${data.table_id}`);
        loadOrders();
        loadPaymentRequests();
      });

      socket.on('order_status_update', (data) => {
        console.log('Order status updated:', data);
        loadOrders();
      });

      socket.on('payment_requested', (data) => {
        console.log('Payment requested:', data);
        playNotificationSound();
        const amount = formatMoney(data.total || data.bill?.total || 0);
        showPaymentAlert(`💳 ${data.table_name || `Table ${data.table_id}`} has requested payment — ${amount}`);
        loadOrders();
        loadPaymentRequests();
      });

      socket.on('payment_confirmed', (data) => {
        console.log('Payment confirmed:', data);
        showNotification(`✅ Payment confirmed for ${data.table_name || `Table ${data.table_id}`}`);
        loadOrders();
        loadPaymentRequests();
      });

      socket.on('bill_updated', (data) => {
        if (billPanelTableId && Number(data.table_id) === Number(billPanelTableId)) {
          renderBillPanel(data.bill);
        }
      });

      socket.on('disconnect', () => {
        document.getElementById('statusDot').classList.add('disconnected');
        document.getElementById('statusText').textContent = 'Disconnected';
      });

      socket.on('app_error', (err) => {
        console.error('Socket error:', err);
      });
    }

    function playNotificationSound() {
      // Create a simple beep using Web Audio API
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = 800;
        oscillator.type = 'sine';

        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
      } catch (e) {
        console.log('Audio not available');
      }
    }

    // ==================== DATA LOADING ====================
    async function loadTables() {
      try {
        const response = await fetch('/api/tables');
        const result = await response.json();

        if (!result.success) return;

        allTables = result.data;
        renderTables();
        loadPaymentStatuses();
        loadOrders();
        loadPaymentRequests();
      } catch (error) {
        console.error('Load tables error:', error);
      }
    }

    async function loadOrders() {
      try {
        const response = await fetch('/api/orders', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const result = await response.json();

        if (!result.success) return;

        allOrders = result.data;
        renderTables();
        loadPaymentStatuses();

        if (selectedTableId) {
          updateSidePanel();
        }

        // Calculate revenue
        const revenue = allOrders
          .filter(o => o.status === 'paid')
          .reduce((sum, order) => {
            const total = order.items.reduce((s, item) => s + (item.quantity * item.unit_price), 0);
            return sum + total;
          }, 0);

        document.getElementById('revenueAmount').textContent = `₹${revenue.toFixed(0)}`;
      } catch (error) {
        console.error('Load orders error:', error);
      }
    }

    async function loadPaymentRequests() {
      if (!token) return;
      try {
        const response = await fetch('/api/orders/payment-requests', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await response.json();
        if (!result.success) return;
        paymentRequests = result.data;
        renderPayments();
        renderTables();
        loadPaymentStatuses();
      } catch (error) {
        console.error('Load payment requests error:', error);
      }
    }

    async function loadPaymentStatuses() {
      if (!allTables.length) return;
      try {
        const statuses = await Promise.all(allTables.map(table =>
          fetch(`/api/orders/table/${table.id}/payment-status`)
            .then(response => response.json())
            .then(result => result.success ? [table.id, result.data] : [table.id, { status: 'none', grandTotal: 0 }])
            .catch(() => [table.id, { status: 'none', grandTotal: 0 }])
        ));
        paymentStatuses = Object.fromEntries(statuses);
        renderTables();
      } catch (error) {
        console.error('Load payment statuses error:', error);
      }
    }

    // ==================== RENDERING ====================
    function renderTables() {
      const grid = document.getElementById('tablesGrid');
      grid.innerHTML = '';

      allTables.forEach(table => {
        const tableOrders = allOrders.filter(o => o.table_id === table.id);
        const pendingCount = tableOrders.filter(o => o.status !== 'served').length;
        const statusInfo = paymentStatuses[table.id] || {};
        const paymentRequested = statusInfo.status === 'requested' || tableOrders.some(o => o.payment_requested_at);
        const paymentConfirmed = statusInfo.status === 'confirmed' && tableOrders.length === 0;
        const request = paymentRequests.find(item => item.table_id === table.id);
        const lastOrder = tableOrders.length > 0 ? new Date(tableOrders[0].created_at) : null;

        const card = document.createElement('div');
        card.className = `table-card ${selectedTableId === table.id ? 'active' : ''} ${paymentRequested ? 'payment-requested' : ''}`;
        card.onclick = (event) => selectTable(table.id, event);

        card.innerHTML = `
          <div class="table-card-header">
            <div class="table-name">${table.name}</div>
            <div class="pending-badge ${pendingCount === 0 ? 'zero' : ''}">
              ${pendingCount} order${pendingCount !== 1 ? 's' : ''}
            </div>
          </div>
          <div class="table-info">
            ${tableOrders.length > 0 ? `
              <div>Active orders: ${tableOrders.length}</div>
              <div>Last: ${formatTime(lastOrder)}</div>
              ${paymentRequested ? '<div class="payment-badge">⚡ Payment Requested</div>' : ''}
            ` : `
              <div style="color: var(--gray);">${paymentConfirmed ? 'Bill paid' : 'No orders yet'}</div>
            `}
            <div class="table-payment-actions">
              <button class="btn-bill" onclick="openBillPanel(${table.id}, event)">🧾 Bill</button>
              ${renderTablePaymentButton(table, paymentRequested, paymentConfirmed)}
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function renderTablePaymentButton(table, paymentRequested, paymentConfirmed) {
      if (paymentConfirmed) {
        return '<button class="btn-table-payment paid" disabled>✅ Paid</button>';
      }
      const buttonClass = paymentRequested ? 'btn-table-payment requested' : 'btn-table-payment';
      const label = paymentRequested ? '⚡ Payment Requested · Confirm' : '💳 Confirm Payment';
      return `<button class="${buttonClass}" onclick="confirmTablePayment(${table.id}, event)">${label}</button>`;
    }

    function selectTable(tableId, event) {
      selectedTableId = tableId;
      document.querySelectorAll('.table-card').forEach(card => card.classList.remove('active'));
      if (event?.currentTarget) {
        event.currentTarget.classList.add('active');
      }
      updateSidePanel();
      document.getElementById('sidePanel').classList.add('active');
    }

    function switchDashboardTab(tab) {
      const showPayments = tab === 'payments';
      document.getElementById('tablesGrid').style.display = showPayments ? 'none' : 'grid';
      document.getElementById('paymentsList').classList.toggle('active', showPayments);
      document.getElementById('ordersTabBtn').classList.toggle('active', !showPayments);
      document.getElementById('paymentsTabBtn').classList.toggle('active', showPayments);
      if (showPayments) loadPaymentRequests();
    }

    async function openBillPanel(tableId, event) {
      if (event) event.stopPropagation();
      selectedTableId = tableId;
      billPanelTableId = tableId;
      const table = allTables.find(t => t.id === tableId);
      document.getElementById('panelTitle').textContent = `${table?.name || 'Table'} Bill`;
      document.getElementById('panelContent').innerHTML = '<div style="color: var(--gray); text-align:center; padding:2rem;">Loading bill...</div>';
      document.getElementById('sidePanel').classList.add('active');
      try {
        const response = await fetch(`/api/orders/table/${tableId}/bill-summary`);
        const result = await response.json();
        if (!result.success) {
          showNotification(`❌ ${result.error || 'Failed to load bill'}`);
          return;
        }
        renderBillPanel(result.data);
      } catch (error) {
        console.error('Load bill error:', error);
        showNotification('❌ Failed to load bill');
      }
    }

    function renderBillPanel(bill) {
      const content = document.getElementById('panelContent');
      if (!bill || !bill.items || bill.items.length === 0) {
        content.innerHTML = '<div style="color: var(--gray); text-align: center; padding: 2rem;">No bill items yet</div>';
        return;
      }

      content.innerHTML = `
        <div class="bill-card-total">${formatMoney(bill.total)}</div>
        ${bill.items.map(item => `
          <div class="bill-row">
            <div class="bill-row-top">
              <span>${item.emoji || '🍽️'} ${item.name}</span>
              <span>${formatMoney(item.line_total || item.subtotal)}</span>
            </div>
            <div class="order-item-details">
              <span>Qty ${item.quantity} × ${formatMoney(item.unit_price)}</span>
              <span class="order-item-status status-${item.status}">${item.status}</span>
            </div>
          </div>
        `).join('')}
        <div class="bill-summary-line"><span>Subtotal</span><span>${formatMoney(bill.subtotal)}</span></div>
        <div class="bill-summary-line"><span>VAT (13%)</span><span>${formatMoney(bill.vat)}</span></div>
        <div class="bill-summary-line"><span>Grand Total</span><span>${formatMoney(bill.total)}</span></div>
      `;
    }

    function updateSidePanel() {
      const panel = document.getElementById('sidePanel');
      const tableOrders = allOrders.filter(o => o.table_id === selectedTableId);
      const table = allTables.find(t => t.id === selectedTableId);

      document.getElementById('panelTitle').textContent = table?.name || 'Table';

      const content = document.getElementById('panelContent');
      content.innerHTML = '';

      if (tableOrders.length === 0) {
        content.innerHTML = '<div style="color: var(--gray); text-align: center; padding: 2rem;">No orders for this table</div>';
        return;
      }

      const paymentRequested = tableOrders.some(order => order.payment_requested_at);
      const tableTotal = tableOrders.reduce((sum, order) => {
        return sum + order.items.reduce((itemSum, item) => itemSum + (item.quantity * item.unit_price), 0);
      }, 0);

      const paymentBox = document.createElement('div');
      paymentBox.className = 'payment-summary';
      paymentBox.innerHTML = `
        <div>${paymentRequested ? '⚡ Payment requested' : 'Payment can be confirmed anytime'}</div>
        <div>Total due: ${formatMoney(tableTotal * 1.13)}</div>
      `;
      content.appendChild(paymentBox);

      const paymentButton = document.createElement('button');
      paymentButton.className = 'btn-payment';
      paymentButton.textContent = paymentRequested ? 'Confirm Payment & Reset Table' : '💳 Confirm Payment';
      paymentButton.onclick = () => confirmTablePayment(selectedTableId);
      content.appendChild(paymentButton);

      tableOrders.forEach(order => {
        order.items.forEach(item => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'order-item';
          itemDiv.innerHTML = `
            <div class="order-item-header">
              <div class="order-item-name">${item.menu_name}</div>
              <div class="order-item-status status-${order.status}">${order.status}</div>
            </div>
            <div class="order-item-details">
              <span>Qty: ${item.quantity}</span>
              <span>₹${(item.quantity * item.unit_price).toFixed(0)}</span>
            </div>
            ${item.notes ? `<div class="order-item-notes">${item.notes}</div>` : ''}
            <div class="order-buttons">
              ${order.status === 'pending' ? `
                <button class="btn-small btn-preparing" onclick="updateOrderStatus(${order.id}, 'preparing')">👨‍🍳 Preparing</button>
              ` : ''}
              ${order.status === 'preparing' ? `
                <button class="btn-small btn-served" onclick="updateOrderStatus(${order.id}, 'served')">✅ Served</button>
              ` : ''}
            </div>
          `;
          content.appendChild(itemDiv);
        });
      });
    }

    function closeSidePanel() {
      document.getElementById('sidePanel').classList.remove('active');
      selectedTableId = null;
      billPanelTableId = null;
      renderTables();
    }

    function renderPayments() {
      const list = document.getElementById('paymentsList');
      if (!paymentRequests.length) {
        list.innerHTML = '<div style="color: var(--gray); text-align:center; padding:3rem;">No pending payment requests</div>';
        return;
      }

      list.innerHTML = paymentRequests.map(request => `
        <div class="payment-card">
          <div class="payment-card-header">
            <div>
              <div class="table-name">${request.table_name}</div>
              <div class="table-info">Requested ${formatTime(new Date(request.requested_at))}</div>
            </div>
            <div class="payment-total">${formatMoney(request.bill.total)}</div>
          </div>
          <div class="payment-items">
            ${request.bill.items.map(item => `${item.emoji || '🍽️'} ${item.name} × ${item.quantity}`).join('<br>')}
          </div>
          <button class="btn-confirm-payment" onclick="confirmTablePayment(${request.table_id})">✅ Confirm Payment</button>
        </div>
      `).join('');
    }

    // ==================== ORDER ACTIONS ====================
    async function updateOrderStatus(orderId, newStatus) {
      try {
        const response = await fetch(`/api/orders/${orderId}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status: newStatus })
        });

        const result = await response.json();

        if (result.success) {
          showNotification(`✅ Order status updated to ${newStatus}`);
          loadOrders();
        }
      } catch (error) {
        console.error('Update status error:', error);
        showNotification('❌ Failed to update status');
      }
    }

    async function confirmTablePayment(tableId, event) {
      if (event) event.stopPropagation();
      if (!tableId) return;
      const table = allTables.find(item => Number(item.id) === Number(tableId));
      const bill = await fetchTableBill(tableId);
      if (!confirm(`Confirm payment for ${table?.name || `Table ${tableId}`}? Total: ${formatMoney(bill.total)}`)) return;

      try {
        const response = await fetch(`/api/orders/table/${tableId}/confirm-payment`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const result = await response.json();

        if (!result.success) {
          showNotification(`❌ ${result.error || 'Failed to confirm payment'}`);
          return;
        }

        showNotification(`✅ Payment confirmed for ${table?.name || `Table ${tableId}`}`);
        if (result.data?.warning) showNotification(`⚠️ ${result.data.warning}`);
        closeSidePanel();
        loadOrders();
        loadPaymentRequests();
        loadPaymentStatuses();
      } catch (error) {
        console.error('Confirm payment error:', error);
        showNotification('❌ Failed to confirm payment');
      }
    }

    async function fetchTableBill(tableId) {
      try {
        const response = await fetch(`/api/orders/table/${tableId}/bill-summary`);
        const result = await response.json();
        return result.success ? result.data : { total: 0 };
      } catch (error) {
        return { total: 0 };
      }
    }

    // ==================== UTILITY FUNCTIONS ====================
    function showNotification(message) {
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.textContent = message;
      document.body.appendChild(notif);

      setTimeout(() => {
        notif.remove();
      }, 3000);
    }

    function showPaymentAlert(message) {
      const alert = document.getElementById('paymentAlert');
      alert.textContent = message;
      alert.classList.add('show');
      setTimeout(() => alert.classList.remove('show'), 7000);
    }

    function formatMoney(value) {
      return `NPR ${Math.round(Number(value) || 0).toLocaleString('en-IN')}`;
    }

    function formatTime(date) {
      if (!date) return 'N/A';
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);

      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return date.toLocaleDateString();
    }

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Receptionist dashboard loaded');
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeSidePanel();
    });
  </script>
</body>
</html>
